    <style id="ch-inline-overrides">
        /* Immediate overrides to ensure mobile card and search layout updates without waiting for cached CSS */
        .dashboard-container, .container { padding-left: 0.6rem !important; padding-right: 0.6rem !important; }
        .dashboard-section table:not(.no-mobile-cards) tr { padding: 0.85rem 0.9rem !important; margin-bottom: 0.6rem !important; }
        .dashboard-section table:not(.no-mobile-cards) td[data-label="Name"], .dashboard-section table:not(.no-mobile-cards) td:first-child { flex-direction: column !important; align-items: flex-start !important; text-align: left !important; padding-left: 0.6rem !important; padding-right: 0.6rem !important; }
        .dashboard-section table:not(.no-mobile-cards) td[data-label="Name"] > div:first-child { font-weight: 800 !important; font-size: 1rem !important; line-height: 1.05 !important; }
        .dashboard-section table:not(.no-mobile-cards) td[data-label="Name"] > div:nth-child(2) { font-size: 0.78rem !important; color: rgba(203,213,225,0.9) !important; margin-top: 0.18rem !important; }
        input[placeholder="Search members..."] { width: 420px !important; max-width: 75% !important; min-width: 160px !important; padding: 0.65rem 1rem !important; border-radius: 12px !important; box-sizing: border-box !important; }
        @media (max-width: 991px) {
            input[placeholder="Search members..."] { width: calc(100% - 1.2rem) !important; display:block !important; margin-top: 0.6rem !important; }
            .dashboard-section table:not(.no-mobile-cards) tr { padding-left: 0.85rem !important; padding-right: 0.85rem !important; }
        }
        /* Make header title occupy its own line and place add button on a separate row */
        .members-header { display:block !important; }
        .members-header .section-title { display:block !important; }
        .members-header > div { margin-top: 0.5rem; }
        @media (max-width: 640px) {
            .members-header > div { display:block !important; width:100% !important; text-align:right !important; }
            .members-header > div .btn { display:inline-block !important; }
        }
        /* Widen mobile cards for readability and touch targets */
        @media (max-width: 991px) {
            .dashboard-section table:not(.no-mobile-cards) tr { padding: 1.1rem !important; margin-bottom: 1rem !important; border-radius: 14px !important; max-width: calc(100% - 1.4rem) !important; width: calc(100% - 1.4rem) !important; }
        }
        /* Make members header, search and cards occupy full mobile width */
        @media (max-width: 991px) {
            .container, .dashboard-container { padding-left: 0.5rem !important; padding-right: 0.5rem !important; }
            .members-header { display:flex !important; flex-direction:column !important; gap:0.6rem !important; }
            .members-header > div { width:100% !important; display:flex !important; justify-content:flex-end !important; }
            .members-header .btn { width:100% !important; max-width:none !important; align-self:flex-end !important; }
            input#members-search { width:100% !important; max-width:none !important; padding:0.8rem 1rem !important; }
            .dashboard-section table:not(.no-mobile-cards), .dashboard-section table:not(.no-mobile-cards) tbody { width:100% !important; }
            .dashboard-section table:not(.no-mobile-cards) tr { display:block !important; width:100% !important; box-sizing:border-box !important; padding:1rem !important; margin-bottom:1rem !important; border-radius:14px !important; }
            .dashboard-section table:not(.no-mobile-cards) td, .dashboard-section table:not(.no-mobile-cards) th { display:block !important; width:100% !important; padding:0.35rem 0 !important; }
            .dashboard-section table:not(.no-mobile-cards) td[data-label="Actions"] { text-align:left !important; }
            .dashboard-section table:not(.no-mobile-cards) td[data-label="Actions"] .btn { width:100% !important; display:block !important; margin-bottom:0.5rem !important; }
        }

    <script>
        // Redirect to the dev page if someone accidentally opens the old page
    </script>
    <script src="api-service.js?v=20260429_v18"></script>
    <script>
    (async function(){
        try {
            // Unregister any service workers and clear caches to make sure we run fresh
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(r => r.unregister()));
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(k => caches.delete(k)));
            }
        } catch (e) {}

        // Load admin members using current JS API
        const data = await apiService.getAdminDashboardData();
        // Simple output for dev verification
        document.body.innerHTML = '<pre style="white-space:pre-wrap;">' + JSON.stringify(data, null, 2) + '</pre>';
    })();
    </script>
