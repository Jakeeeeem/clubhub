<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ClubHub | Premium Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="ui/styles/components.css">
    <link rel="stylesheet" href="group-switcher.css">
    
    <!-- Core Services -->
    <script src="api-service.js?v=20260429_v14"></script>
    <script src="group-switcher.js?v=20260429_v14"></script>
    
    <style>
        /* Base Reset */
        * { box-sizing: border-box; }
        body { 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Premium Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, hsla(var(--primary-h), var(--primary-s), var(--primary-l), 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, hsla(var(--primary-h), var(--primary-s), var(--primary-l), 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="clubhub-unified">
    <div id="app"></div>
    
    <!-- Main App Script (Module) -->
    <script type="module" src="ui/app.js"></script>
</body>
</html>
