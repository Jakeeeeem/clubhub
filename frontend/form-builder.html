<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Builder — ClubHub</title>
    <meta name="description" content="Create and manage custom forms for your group">
    <link rel="stylesheet" href="styles.css?v=20260424_v4">
    <link rel="stylesheet" href="design-system.css?v=20260424_v4">
    <link rel="stylesheet" href="unified-nav.css?v=20260424_v4">
    <script src="api-service.js?v=20260424_v4"></script>
    <style>
        /* ── Variables ── */
        :root {
            --builder-accent: #6366f1;
            --builder-accent-glow: rgba(99, 102, 241, 0.25);
            --card-glass: rgba(255, 255, 255, 0.04);
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* ── Page Layout ── */
        .builder-layout {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }

        @media (max-width: 1024px) {
            .builder-layout {
                grid-template-columns: 1fr 1fr;
            }

            .preview-panel {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 640px) {
            .builder-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ── Panel Cards ── */
        .panel {
            background: var(--card-glass);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
        }

        .panel-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }

        /* ── Field Type Palette ── */
        .field-palette {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .field-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: grab;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            text-align: center;
        }

        .field-chip i {
            font-size: 1.4rem;
            margin-bottom: 2px;
            display: block;
        }

        .field-chip:hover {
            background: var(--builder-accent-glow);
            border-color: var(--builder-accent);
            color: var(--builder-accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
        }

        /* ── Canvas ── */
        .canvas-header {
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            border-radius: 16px 16px 0 0;
            text-align: center;
        }

        .canvas-header input[type="text"] {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .canvas-header input[type="text"]:focus {
            border-bottom-color: var(--builder-accent);
        }

        .canvas-header textarea {
            text-align: center;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        #fieldCanvas {
            padding: 2rem;
            min-height: 400px;
            background: #0f172a;
            border: 2px dashed rgba(255, 255, 255, 0.05);
            border-radius: 0 0 16px 16px;
        }

        #fieldCanvas.empty::after {
            content: '✨ Drag & Drop components here to build your form';
            font-size: 1rem;
            opacity: 0.5;
            letter-spacing: 1px;
            margin-top: 5rem;
        }

        /* ── Field Row ── */
        .field-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            margin-bottom: 1rem;
        }

        .field-row:hover {
            border-color: var(--builder-accent);
            background: rgba(255, 255, 255, 0.04);
            transform: scale(1.005);
        }

        .field-row.selected {
            border-color: var(--builder-accent);
            background: var(--builder-accent-glow);
            box-shadow: 0 0 0 2px var(--builder-accent);
        }

        .field-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .field-row-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .field-mock-input {
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            pointer-events: none;
        }

        .field-row-handle {
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--builder-accent);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: grab;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .field-row:hover .field-row-handle {
            opacity: 1;
        }

        .field-row-delete {
            position: absolute;
            right: 0.5rem;
            top: 0.5rem;
            background: rgba(248, 113, 113, 0.1);
            border: none;
            color: #f87171;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .field-row:hover .field-row-delete {
            opacity: 1;
        }

        /* ── Properties Panel ── */
        .props-placeholder {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 0;
            font-size: 0.9rem;
        }

        .prop-group {
            margin-bottom: 1.25rem;
        }

        .prop-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .prop-group input,
        .prop-group select,
        .prop-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.55rem 0.75rem;
            color: var(--text-main);
            font-size: 0.88rem;
        }

        .prop-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-row label {
            font-size: 0.9rem;
            color: var(--text-main);
            margin: 0;
        }

        .toggle-switch-sm input {
            display: none;
        }

        .toggle-switch-sm span {
            display: inline-block;
            width: 36px;
            height: 20px;
            background: var(--border-color);
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch-sm span::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: left 0.2s;
        }

        .toggle-switch-sm input:checked+span {
            background: var(--builder-accent);
        }

        .toggle-switch-sm input:checked+span::after {
            left: 19px;
        }

        .options-builder {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .option-row {
            display: flex;
            gap: 0.4rem;
        }

        .option-row input {
            flex: 1;
        }

        .option-row button {
            background: rgba(248, 113, 113, 0.1);
            border: none;
            color: #f87171;
            border-radius: 6px;
            padding: 0 0.5rem;
            cursor: pointer;
        }

        .btn-add-option {
            margin-top: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--builder-accent);
            border: 1px dashed var(--builder-accent);
            border-radius: 8px;
            width: 100%;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 0.83rem;
            font-weight: 600;
            transition: background 0.15s;
        }

        .btn-add-option:hover {
            background: var(--builder-accent-glow);
        }

        /* ── Action bar ── */
        .canvas-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-save-form {
            background: linear-gradient(135deg, var(--builder-accent), #818cf8);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.75rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 20px var(--builder-accent-glow);
        }

        .btn-save-form:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-save-form:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-preview-form {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-preview-form:hover {
            border-color: var(--builder-accent);
            color: var(--builder-accent);
        }

        /* ── Forms List sidebar ── */
        .form-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 0.6rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .form-list-item:hover {
            border-color: var(--builder-accent);
            background: var(--builder-accent-glow);
        }

        .form-list-item-title {
            font-weight: 600;
            font-size: 0.88rem;
        }

        .form-list-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .badge-responses {
            background: rgba(99, 102, 241, 0.2);
            color: var(--builder-accent);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 99px;
        }

        /* ── Modal preview ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-box {
            background: var(--bg-card, #1a1a2e);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-box h2 {
            margin: 0 0 1.5rem;
        }

        .modal-box .preview-field {
            margin-bottom: 1.25rem;
        }

        .modal-box .preview-field label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .modal-box .preview-field label .req {
            color: #f87171;
            margin-left: 3px;
        }

        .modal-box .preview-field input,
        .modal-box .preview-field select,
        .modal-box .preview-field textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text-main);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-box {
            position: relative;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937;
            color: white;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
            z-index: 9999;
            border-left: 4px solid var(--builder-accent);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <script>window.UNIFIED_NAV_ENABLED = true;</script>
    <header class="header"></header>

    <main class="main dashboard-main">
    <div class="container" style="padding-top:1.5rem;">
        <div
            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
            <div>
                <h1 style="margin:0; font-size:1.75rem;">📋 Form Builder</h1>
                <p style="color:var(--text-muted); margin:0.3rem 0 0;">Create custom forms for registrations, surveys,
                    and data collection</p>
            </div>
            <button class="btn-save-form" onclick="newForm()" id="btnNewForm">+ New Form</button>
        </div>
    </div>

    <div class="builder-layout">
        <!-- ── LEFT PANEL: Field Palette + My Forms ── -->
        <aside>
            <!-- My Forms -->
            <div class="panel" style="margin-bottom:1.25rem;">
                <div class="panel-title">My Forms</div>
                <div id="myFormsContainer">
                    <p style="color:var(--text-muted); font-size:0.88rem;">Loading...</p>
                </div>
            </div>

            <!-- Palette -->
            <div class="panel" id="fieldPalettePanel">
                <div class="panel-title">Field Types</div>
                <div class="field-palette" id="fieldPalette">
                    <div class="field-chip" draggable="true" data-type="text">
                        <span>📝 Short Text</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="textarea">
                        <span>📄 Paragraph</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="number">
                        <span>🔢 Number</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="email">
                        <span>📧 Email</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="phone">
                        <span>📞 Phone</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="date">
                        <span>📅 Date</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="select">
                        <span>🔽 Dropdown</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="checkbox">
                        <span>☑️ Checkbox</span>
                    </div>
                    <div class="field-chip" draggable="true" data-type="file">
                        <span>📤 File Upload</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ── CENTRE PANEL: Canvas ── -->
        <main class="panel">
            <div class="canvas-header">
                <input type="text" id="formTitle" placeholder="Untitled Form" maxlength="120">
                <textarea id="formDescription" placeholder="Add a description (optional)..."></textarea>
            </div>

            <div id="fieldCanvas" class="empty"></div>

            <div class="canvas-actions">
                <button class="btn-save-form" onclick="saveForm()" id="btnSaveForm">💾 Save Form</button>
                <button class="btn-preview-form" onclick="openPreview()">👁 Preview</button>
                <button class="btn-preview-form" onclick="viewResponses()" id="btnViewResponses"
                    style="display:none;">📊 View Responses</button>
                <button class="btn-preview-form" onclick="copyShareLink()" id="btnShareLink" style="display:none;">🔗
                    Share Link</button>
            </div>
        </main>

        <!-- ── RIGHT PANEL: Properties ── -->
        <aside class="panel preview-panel" id="propsPanel">
            <div class="panel-title">Field Properties</div>
            <div id="propsContent">
                <div class="props-placeholder">🖱 Click a field on the canvas to edit its properties</div>
            </div>
        </aside>
    </div>

    <!-- Preview Modal -->
    <div class="modal-backdrop" id="previewModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closePreview()">✕</button>
            <h2 id="previewTitle">Form Preview</h2>
            <div id="previewBody"></div>
            <button class="btn-save-form"
                style="width:100%; margin-top:1rem; background:linear-gradient(135deg,#10b981,#34d399);">Submit</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>


    </main>

    <script src="form-builder.js"></script>
    <script src="unified-nav.js?v=20260424_v4"></script>
</body>

</html>
