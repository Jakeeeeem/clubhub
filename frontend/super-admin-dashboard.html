<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Admin | ClubHub</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Platform administration and system monitoring">
    <meta name="theme-color" content="#dc4343">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="group-switcher.css">
    <link rel="stylesheet" href="unified-nav.css">
    <link rel="stylesheet" href="design-system.css">
    
    <style>
        .platform-header {
            background: linear-gradient(135deg, #dc4343, #ff6b6b);
            padding: 2.5rem;
            border-radius: 20px;
            margin-bottom: 2.5rem;
            color: white;
            box-shadow: 0 10px 30px rgba(220, 67, 67, 0.2);
        }

        @media (max-width: 768px) {
            .stats-grid, .dashboard-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>

<body>
    <script>window.UNIFIED_NAV_ENABLED = true;</script>
    <header class="header pro-header"></header>

    <main class="main dashboard-main" style="padding-top: 100px;">
        <div class="container dashboard-container">
            <div class="platform-header">
                <h1 style="font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem;">Mission Control</h1>
                <p style="opacity: 0.9;">System-wide monitoring, organization management, and security.</p>
            </div>

            <div class="stats-grid" style="margin-bottom: 2.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                <div class="stat-card">
                    <span class="stat-label">TOTAL GROUPS</span>
                    <span class="stat-number" id="totalOrgs">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">TOTAL USERS</span>
                    <span class="stat-number" id="totalSystemUsers">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">SYSTEM UPTIME</span>
                    <span class="stat-number" id="systemUptime">99.9%</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">STORAGE USED</span>
                    <span class="stat-number">1.2 TB</span>
                </div>
            </div>

            <div class="dashboard-nav-grouped desktop-only" style="margin-bottom: 2.5rem;">
                <button class="nav-item active" onclick="showSuperSection('monitoring')">📈 Monitoring</button>
                <button class="nav-item" onclick="showSuperSection('orgs')">🏰 Organizations</button>
                <button class="nav-item" onclick="showSuperSection('users')">👥 Users</button>
                <button class="nav-item" onclick="showSuperSection('logs')">📋 System Logs</button>
            </div>

            <div id="super-monitoring" class="dashboard-section active">
                <div class="glass-card" style="height: 400px; display: flex; align-items: center; justify-content: center;">
                    <p class="loading-text">Initializing real-time system metrics...</p>
                </div>
            </div>

        </div>
    </main>

    <nav class="pro-bottom-nav mobile-only">
        <div class="bottom-nav-container" id="pro-bottom-nav-content"></div>
    </nav>

    <!-- Core Dependencies -->
    <script src="api-service.js"></script>
    <script src="enhanced-login-handler.js"></script>
    <script src="super-admin-dashboard.js"></script>
    <script src="pwa-install.js"></script>
    <script src="unified-nav.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const isLoggedIn = await checkAuthStatus();
            if (!isLoggedIn) {
                window.location.href = 'index.html';
                return;
            }
            // Super Admin specific init logic here
        });

        function showSuperSection(sectionId) {
            document.querySelectorAll('.dashboard-section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(`super-${sectionId}`);
            if (target) target.style.display = 'block';
        }
    </script>

</body>

</html>
