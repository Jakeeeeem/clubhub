<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tournaments Admin</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 20px
        }

        input,
        button {
            padding: 8px;
            margin: 6px 0
        }
    </style>
</head>

<body>
    <h1>Tournaments Admin</h1>
    <div>
        <input id="tName" placeholder="Tournament name" style="width:300px" />
        <select id="tType">
            <option value="knockout">Knockout</option>
            <option value="league">League</option>
        </select>
        <button id="createTournament">Create</button>
    </div>
    <div style="margin-top:20px">
        <input id="tEventId" placeholder="Event ID" style="width:360px" />
        <button id="genFixtures">Generate Fixtures</button>
    </div>
    <pre id="out" style="background:#f6f6f6;padding:10px;margin-top:12px"></pre>
    <script src="/tournaments-admin.js"></script>
</body>

</html>
