<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Connect | ClubHub Onboarding</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #dc4343;
            --primary-glow: rgba(220, 67, 67, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .stripe-logo {
            color: #6366f1;
            font-weight: 700;
        }
        h1 { margin: 0 0 1rem 0; font-size: 1.75rem; }
        p { color: rgba(255, 255, 255, 0.6); line-height: 1.6; margin-bottom: 2rem; }
        .step {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-align: left;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }
        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }
        .loader {
            display: none;
            margin: 2rem auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="logo">ClubHub <span style="color:rgba(255,255,255,0.4)">x</span> <span class="stripe-logo">stripe</span></div>
        <h1>Setup Direct Payouts</h1>
        <p>Connect your account to Stripe to start receiving payments for your group activities and events.</p>
        
        <div class="step">
            <div class="icon">1</div>
            <div>
                <div style="font-weight:700">Verify Identity</div>
                <div style="font-size:0.8rem; opacity:0.6">Quick secure verification via Stripe</div>
            </div>
        </div>
        <div class="step">
            <div class="icon">2</div>
            <div>
                <div style="font-weight:700">Link Bank Account</div>
                <div style="font-size:0.8rem; opacity:0.6">Where your funds will be sent</div>
            </div>
        </div>

        <button class="btn" onclick="startLoading()">Complete Onboarding (Simulation)</button>
        <div class="loader" id="loader"></div>
    </div>

    <script>
        function startLoading() {
            document.querySelector('.btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.querySelector('p').textContent = 'Synchronizing with Stripe Express...';
            
            setTimeout(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const returnUrl = urlParams.get('return_url') || 'player-dashboard.html';
                window.location.href = returnUrl + '?stripe_status=success';
            }, 2500);
        }
    </script>
</body>
</html>
