<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Dashboard | ClubHub</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Manage your sports organization, events, and members">
    <meta name="theme-color" content="#dc4343">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="group-switcher.css">
    <link rel="stylesheet" href="unified-nav.css">
    <link rel="stylesheet" href="design-system.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        @media (max-width: 768px) {
            .card-grid, .stats-grid, .dashboard-grid {
                grid-template-columns: 1fr !important;
            }
            .dashboard-header {
                flex-direction: column !important;
                align-items: flex-start !important;
            }
        }
    </style>
</head>

<body>
    <script>window.UNIFIED_NAV_ENABLED = true;</script>
    <header class="header pro-header"></header>

    <main class="main dashboard-main" style="padding-top: 100px;">
        <div class="container dashboard-container">
            <div class="dashboard-header" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem;">
                    <div>
                        <h1 class="neon-text display-org-name">Admin Dashboard</h1>
                        <p style="color: var(--text-muted);">Manage your organization's members, events, and revenue.</p>
                    </div>
                </div>
            </div>

            <div class="stats-grid" style="margin-bottom: 2.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                <div class="stat-card">
                    <span class="stat-label">TOTAL MEMBERS</span>
                    <span class="stat-number" id="totalMembers">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">REVENUE (30D)</span>
                    <span class="stat-number" id="monthlyRevenue">£0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">ACTIVE EVENTS</span>
                    <span class="stat-number" id="activeEvents">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">PENDING TASKS</span>
                    <span class="stat-number" id="pendingTasks">0</span>
                </div>
            </div>

            <!-- Tabbed Navigation -->
            <div class="dashboard-nav-grouped desktop-only" style="margin-bottom: 2.5rem;">
                <button class="nav-item active" onclick="showAdminSection('overview')">📊 Overview</button>
                <button class="nav-item" onclick="showAdminSection('members')">👥 Members</button>
                <button class="nav-item" onclick="showAdminSection('events')">📅 Events</button>
                <button class="nav-item" onclick="showAdminSection('finance')">💳 Finance</button>
                <button class="nav-item" onclick="showAdminSection('settings')">⚙️ Settings</button>
            </div>

            <!-- Sections will be toggled by JS -->
            <div id="admin-overview" class="dashboard-section active">
                <div class="dashboard-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                    <div class="glass-card">
                        <h3>Recent Activity</h3>
                        <div id="activityFeed">Loading feed...</div>
                    </div>
                    <div class="glass-card">
                        <h3>Quick Actions</h3>
                        <div style="display: grid; gap: 1rem;">
                            <button class="btn btn-primary btn-block" onclick="openModal('addMemberModal')">+ Add Member</button>
                            <button class="btn btn-primary btn-block" onclick="openModal('addEventModal')">+ Create Event</button>
                            <button class="btn btn-secondary btn-block" onclick="exportData()">⬇️ Export Data</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="admin-members" class="dashboard-section" style="display: none;">
                <div class="glass-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h3>Member Management</h3>
                        <input type="text" id="memberSearch" placeholder="Search members..." class="chat-input" style="width: 300px;">
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="membersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="admin-events" class="dashboard-section" style="display: none;">
                <div class="card-grid" id="eventsGrid"></div>
            </div>

        </div>
    </main>

    <!-- Unified Mobile Bottom Nav container -->
    <div class="pro-bottom-nav mobile-only">
        <div class="bottom-nav-container" id="pro-bottom-nav-content"></div>
    </div>

    <!-- Core Dependencies -->
    <script src="api-service.js"></script>
    <script src="enhanced-login-handler.js"></script>
    <script src="group-switcher.js"></script>
    <script src="admin-dashboard.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const isLoggedIn = await checkAuthStatus();
            if (!isLoggedIn) {
                window.location.href = 'index.html';
                return;
            }

            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                document.getElementById('adminNameDisplay').textContent = user.firstName || user.first_name || 'Admin';
                document.getElementById('userInitial').textContent = (user.firstName || user.first_name || 'A').charAt(0).toUpperCase();
            }

            // Sync toggle state
            const toggle = document.getElementById('mode-toggle');
            if (toggle) {
                toggle.checked = false;
                toggle.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        window.location.href = 'player-dashboard.html';
                    }
                });
            }
        });

        function showAdminSection(sectionId) {
            document.querySelectorAll('.dashboard-section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(`admin-${sectionId}`);
            if (target) target.style.display = 'block';
        }
    </script>

    <nav class="pro-bottom-nav mobile-only">
        <div class="bottom-nav-container" id="pro-bottom-nav-content"></div>
    </nav>

    <!-- Core Dependencies -->
    <script src="api-service.js"></script>
    <script src="enhanced-login-handler.js"></script>
    <script src="pwa-install.js"></script>
    <script src="unified-nav.js"></script>
</body>

</html>
