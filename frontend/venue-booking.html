<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Booking - ClubHub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="unified-nav.css">
    <link rel="stylesheet" href="group-switcher.css">
    <style>
        .venue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .venue-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .venue-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .venue-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .calendar-view {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            margin: 2rem 0;
        }

        .time-slot {
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .time-slot.available {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
        }

        .time-slot.booked {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            cursor: not-allowed;
        }

        .time-slot.available:hover {
            background: rgba(34, 197, 94, 0.2);
        }
    </style>
</head>

    <script>window.UNIFIED_NAV_ENABLED = true;</script>
    <header class="header"></header>

    <main class="main dashboard-main">
        <div class="container dashboard-container">
            <div class="dashboard-header">
                <div>
                    <h1 class="neon-text">Venue Booking</h1>
                    <p style="color: var(--text-muted);">Browse and book sports venues for your club.</p>
                </div>
            </div>

            <div class="dashboard-content">

                <!-- Tabs -->
                <div class="tabs" style="margin: 2rem 0;">
                    <button class="tab active" onclick="showTab('browse')">Browse Venues</button>
                    <button class="tab" onclick="showTab('mybookings')">My Bookings</button>
                </div>

                <!-- Browse Venues Tab -->
                <div id="browse-tab" class="tab-content active">
                    <div class="filters"
                        style="margin-bottom: 2rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;">
                        <input type="text" id="searchVenue" placeholder="Search venues..."
                            style="flex: 1; min-width: 200px;">
                        <select id="locationFilter" style="flex: 0.5; min-width: 150px;">
                            <option value="">All Locations</option>
                        </select>
                        <div class="facility-filters" style="display: flex; gap: 1rem; align-items: center;">
                            <label
                                style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem;">
                                <input type="checkbox" id="filter4G" onchange="loadVenues()"> 4G/3G
                            </label>
                            <label
                                style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem;">
                                <input type="checkbox" id="filterGrass" onchange="loadVenues()"> Grass
                            </label>
                            <label
                                style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem;">
                                <input type="checkbox" id="filterFloodlit" onchange="loadVenues()"> Floodlit
                            </label>
                            <label
                                style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem;">
                                <input type="checkbox" id="filterChanging" onchange="loadVenues()"> Changing Rooms
                            </label>
                        </div>
                        <button class="btn btn-primary" onclick="loadVenues()">Apply Filters</button>
                    </div>

                    <div id="venueGrid" class="venue-grid">
                        <!-- Venues will be loaded here -->
                    </div>
                </div>

                <!-- My Bookings Tab -->
                <div id="mybookings-tab" class="tab-content" style="display: none;">
                    <div id="myBookingsList">
                        <!-- Bookings will be loaded here -->
                    </div>
                </div>
            </div>
    </main>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close" onclick="closeBookingModal()">&times;</span>
            <h2 id="venueName">Venue Name</h2>

            <div id="venueDetails" style="margin: 2rem 0;">
                <!-- Venue details -->
            </div>

            <div id="venueDocuments"
                style="margin: 1.5rem 0; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <!-- Venue documents will be loaded here -->
            </div>

            <h3>Select Date & Time</h3>
            <input type="date" id="bookingDate" onchange="loadAvailability()">

            <div id="availabilitySlots" class="calendar-view">
                <!-- Time slots will appear here -->
            </div>

            <div id="bookingForm" style="display: none; margin-top: 2rem;">
                <h3>Confirm Booking</h3>
                <p><strong>Date:</strong> <span id="selectedDate"></span></p>
                <p><strong>Time:</strong> <span id="selectedTime"></span></p>
                <p><strong>Cost:</strong> £<span id="bookingCost"></span></p>

                <textarea id="bookingNotes" placeholder="Any special requirements?" rows="3"></textarea>

                <button class="btn btn-primary" onclick="confirmBooking()">Confirm Booking</button>
            </div>
        </div>
    </div>

    <script src="api-service.js?v=20260429_v5"></script>
    <script src="unified-nav.js?v=20260429_v5"></script>
    <script src="script.js"></script>
    <script src="enhanced-login-handler.js"></script>
    <script src="group-switcher.js?v=20260429_v5"></script>
    <script>
        let venues = [];
        let selectedVenue = null;
        let selectedSlot = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Check auth status
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || (user.userType !== 'admin' && user.userType !== 'organization')) {
                window.location.href = 'index.html';
                return;
            }

            // Load venues
            loadVenues();

            // Initialize user display
            if (document.getElementById('adminNameDisplay')) {
                document.getElementById('adminNameDisplay').innerText = `Hello, ${user.firstName || user.first_name || 'Admin'}!`;
            }
            if (document.getElementById('adminAvatar')) {
                document.getElementById('adminAvatar').innerText = (user.firstName || user.first_name || 'A').charAt(0).toUpperCase();
            }
        });

        async function loadVenues() {
            try {
                const search = document.getElementById('searchVenue').value.toLowerCase();
                const location = document.getElementById('locationFilter').value;
                const filter4G = document.getElementById('filter4G').checked;
                const filterGrass = document.getElementById('filterGrass').checked;
                const filterFloodlit = document.getElementById('filterFloodlit').checked;
                const filterChanging = document.getElementById('filterChanging').checked;

                const data = await apiService.makeRequest('/venues');
                venues = data;

                // Client-side filtering
                const filtered = data.filter(v => {
                    const matchesSearch = !search || v.name.toLowerCase().includes(search) || v.description.toLowerCase().includes(search);
                    const matchesLocation = !location || v.location === location;

                    // Surface check (if v.surface is '4G' or 'Grass')
                    const matchesSurface = (!filter4G && !filterGrass) ||
                        (filter4G && v.surface === '4G') ||
                        (filterGrass && v.surface === 'Grass');

                    const matchesFloodlit = !filterFloodlit || v.is_floodlit;
                    const matchesChanging = !filterChanging || v.has_changing_rooms;

                    return matchesSearch && matchesLocation && matchesSurface && matchesFloodlit && matchesChanging;
                });

                displayVenues(filtered);
            } catch (error) {
                console.error('Load venues error:', error);
                // alert('Failed to load venues');
                // Fallback demo data
                const demoVenues = [
                    { id: 'v1', name: 'Elite Sports Complex', location: 'Birmingham', capacity: 100, hourly_rate: 45, surface: '4G', is_floodlit: true, has_changing_rooms: true, description: 'Premium 4G pitch with top-tier lighting.' },
                    { id: 'v2', name: 'Greenfields Stadium', location: 'London', capacity: 5000, hourly_rate: 150, surface: 'Grass', is_floodlit: true, has_changing_rooms: true, description: 'Large capacity grass stadium.' },
                    { id: 'v3', name: 'Community Hub Court', location: 'Manchester', capacity: 20, hourly_rate: 20, surface: 'Indoors', is_floodlit: false, has_changing_rooms: true, description: 'Indoor community court.' }
                ];
                displayVenues(demoVenues);
            }
        }

        function displayVenues(venueList) {
            const grid = document.getElementById('venueGrid');

            if (venueList.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">No venues match your criteria.</p>';
                return;
            }

            grid.innerHTML = venueList.map(venue => `
                <div class="venue-card" onclick="openBookingModal('${venue.id}')">
                    ${venue.image_url ? `<img src="${venue.image_url}" class="venue-image" alt="${venue.name}" onerror="this.src='https://images.unsplash.com/photo-1529900235636-31767e7686ac?w=800'">` : `<img src="https://images.unsplash.com/photo-1529900235636-31767e7686ac?w=800" class="venue-image">`}
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                        <h3>${venue.name}</h3>
                        <span class="badge" style="background: rgba(220, 38, 38, 0.1); color: var(--primary); font-size: 0.7rem;">${venue.surface || 'N/A'}</span>
                    </div>
                    <p><strong>📍 Location:</strong> ${venue.location || 'N/A'}</p>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin: 0.5rem 0; font-size: 0.85rem; color: var(--text-muted);">
                        <span>💡 ${venue.is_floodlit ? 'Floodlit' : 'No Lighting'}</span>
                        <span>👕 ${venue.has_changing_rooms ? 'Changing Rooms' : 'No Facilities'}</span>
                    </div>
                    <p><strong>Capacity:</strong> ${venue.capacity || 'N/A'}</p>
                    <p><strong>Rate:</strong> £${venue.hourly_rate || 0}/hour</p>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">View & Book</button>
                </div>
            `).join('');
        }

        async function openBookingModal(venueId) {
            selectedVenue = venues.find(v => v.id === venueId);
            if (!selectedVenue) return;

            document.getElementById('venueName').textContent = selectedVenue.name;
            document.getElementById('venueDetails').innerHTML = `
                <p><strong>Location:</strong> ${selectedVenue.location}</p>
                <p><strong>Capacity:</strong> ${selectedVenue.capacity} people</p>
                <p><strong>Hourly Rate:</strong> £${selectedVenue.hourly_rate}</p>
                <p>${selectedVenue.description || ''}</p>
            `;

            // Set min date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('bookingDate').min = today;
            document.getElementById('bookingDate').value = today;

            document.getElementById('bookingModal').style.display = 'block';
            loadAvailability();
            loadVenueDocuments(venueId);
        }

        async function loadVenueDocuments(venueId) {
            const container = document.getElementById('venueDocuments');
            if (!container) return;

            try {
                const docs = await apiService.makeRequest(`/venues/${venueId}/documents`);
                if (docs && docs.length > 0) {
                    container.innerHTML = '<h3>Venue Documents</h3><ul style="list-style: none; padding: 0;">' +
                        docs.map(doc => `
                            <li style="margin-bottom: 0.5rem;">
                                📄 <a href="${doc.file_url}" target="_blank" style="color: var(--primary); text-decoration: none;">${doc.name}</a>
                            </li>
                        `).join('') + '</ul>';
                } else {
                    container.innerHTML = '';
                }
            } catch (error) {
                console.warn('Failed to load venue documents:', error);
                container.innerHTML = '';
            }
        }

        function closeBookingModal() {
            document.getElementById('bookingModal').style.display = 'none';
            document.getElementById('bookingForm').style.display = 'none';
            selectedSlot = null;
        }

        async function loadAvailability() {
            const date = document.getElementById('bookingDate').value;
            if (!date || !selectedVenue) return;

            try {
                const data = await apiService.makeRequest(`/venues/${selectedVenue.id}/availability?date=${date}`);
                displayAvailability(data);
            } catch (error) {
                console.error('Load availability error:', error);
            }
        }

        function displayAvailability(data) {
            const container = document.getElementById('availabilitySlots');

            // Generate time slots (9 AM to 9 PM)
            const slots = [];
            for (let hour = 9; hour <= 21; hour++) {
                const startTime = `${hour.toString().padStart(2, '0')}:00`;
                const endTime = `${(hour + 1).toString().padStart(2, '0')}:00`;

                // Check if slot is booked
                const isBooked = data.bookings.some(booking => {
                    const bookingStart = new Date(booking.start_time).getHours();
                    return bookingStart === hour;
                });

                slots.push({
                    startTime,
                    endTime,
                    available: !isBooked
                });
            }

            container.innerHTML = slots.map(slot => `
                <div class="time-slot ${slot.available ? 'available' : 'booked'}" 
                     onclick="${slot.available ? `selectSlot('${slot.startTime}', '${slot.endTime}')` : ''}">
                    ${slot.startTime} - ${slot.endTime}
                    <span style="float: right;">${slot.available ? '✓ Available' : '✗ Booked'}</span>
                </div>
            `).join('');
        }

        function selectSlot(startTime, endTime) {
            selectedSlot = { startTime, endTime };

            const date = document.getElementById('bookingDate').value;
            const cost = selectedVenue.hourly_rate;

            document.getElementById('selectedDate').textContent = date;
            document.getElementById('selectedTime').textContent = `${startTime} - ${endTime}`;
            document.getElementById('bookingCost').textContent = cost;
            document.getElementById('bookingForm').style.display = 'block';
        }

        async function confirmBooking() {
            if (!selectedVenue || !selectedSlot) return;

            const date = document.getElementById('bookingDate').value;
            const notes = document.getElementById('bookingNotes').value;

            const startTime = `${date}T${selectedSlot.startTime}:00`;
            const endTime = `${date}T${selectedSlot.endTime}:00`;

            try {
                await apiService.makeRequest(`/venues/${selectedVenue.id}/book`, {
                    method: 'POST',
                    body: JSON.stringify({
                        startTime,
                        endTime,
                        notes
                    })
                });

                alert('Booking confirmed!');
                closeBookingModal();
                showTab('mybookings');
                loadMyBookings();
            } catch (error) {
                console.error('Booking error:', error);
                alert('Booking failed: ' + error.message);
            }
        }

        async function loadMyBookings() {
            try {
                const data = await apiService.makeRequest('/venues/bookings/my');
                displayMyBookings(data);
            } catch (error) {
                console.error('Load bookings error:', error);
            }
        }

        function displayMyBookings(bookings) {
            const container = document.getElementById('myBookingsList');

            if (bookings.length === 0) {
                container.innerHTML = '<p>No bookings yet</p>';
                return;
            }

            container.innerHTML = bookings.map(booking => `
                <div class="card" style="margin-bottom: 1rem;">
                    <h3>${booking.venue_name}</h3>
                    <p><strong>Location:</strong> ${booking.location}</p>
                    <p><strong>Date:</strong> ${new Date(booking.start_time).toLocaleDateString()}</p>
                    <p><strong>Time:</strong> ${new Date(booking.start_time).toLocaleTimeString()} - ${new Date(booking.end_time).toLocaleTimeString()}</p>
                    <p><strong>Cost:</strong> £${booking.total_cost}</p>
                    <p><strong>Status:</strong> <span class="badge">${booking.status}</span></p>
                    ${booking.notes ? `<p><strong>Notes:</strong> ${booking.notes}</p>` : ''}
                </div>
            `).join('');
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');

            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).style.display = 'block';

            if (tabName === 'mybookings') {
                loadMyBookings();
            }
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('bookingModal');
            if (event.target === modal) {
                closeBookingModal();
            }
        }
    </script>
    <script src="api-service.js?v=20260429_v5"></script>
    <script src="unified-nav.js?v=20260429_v5"></script>
</body>

</html>
