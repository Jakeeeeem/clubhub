<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger — ClubHub Admin</title>
    <meta name="description" content="ClubHub Admin Messenger - Secure team communication">
    <meta name="theme-color" content="#dc4343">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="unified-nav.css">
    <style>
        .messenger-container {
            height: calc(100vh - 140px);
            min-height: 600px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .messenger-header {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        @media (max-width: 991px) {
            .messenger-container {
                height: calc(100vh - 180px);
            }
        }
    </style>
</head>

<body class="clubhub-unified dashboard-page">
    <script>window.UNIFIED_NAV_ENABLED = true;</script>

    <header class="header"></header>

    <main class="main dashboard-main">
        <div class="container dashboard-container">
            <!-- Page Title -->
            <div style="margin-bottom:1.5rem;">
                <h1 class="neon-text" style="font-size:1.6rem;margin:0;">Club Messenger</h1>
                <p style="color:var(--text-muted);font-size:0.88rem;margin-top:0.25rem;">Secure communication for your squads and staff</p>
            </div>

            <!-- Single Messenger Section -->
            <div id="overview" class="messenger-container dashboard-section active" style="display: flex;">
                <div id="admin-messenger-mount" style="flex: 1;"></div>
            </div>
        </div>
    </main>

    <script src="app-state.js"></script>
    <script src="api-service.js?v=20260429_v16"></script>
    <script src="enhanced-login-handler.js?v=20260429_v16"></script>
    <script src="group-switcher.js?v=20260429_v16"></script>
    <script src="pwa-install.js?v=20260429_v16"></script>
    <script src="unified-nav.js?v=20260429_v16"></script>
    <script src="squad-messenger.js?v=20260429_v16"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check
            if (typeof checkAuthStatus === 'function') {
                const ok = await checkAuthStatus();
                if (!ok) { window.location.href = 'index.html'; return; }
            }

            // Mount messenger immediately
            mountMessenger();
        });

        async function mountMessenger() {
            if (typeof SquadMessenger !== 'undefined') {
                console.log("🚀 Mounting SquadMessenger...");
                try {
                    await SquadMessenger.mount('admin-messenger-mount');
                    await SquadMessenger.load();
                    console.log("✅ Messenger mounted and loaded successfully");
                } catch (err) {
                    console.error("❌ Messenger mount failed:", err);
                    document.getElementById('admin-messenger-mount').innerHTML = 
                        '<div style="padding: 2rem; color: #f87171;">Messenger failed to initialize. Please refresh.</div>';
                }
            } else {
                console.warn("⏳ SquadMessenger not yet loaded, retrying in 500ms...");
                setTimeout(mountMessenger, 500);
            }
        }
    </script>
</body>

</html>
