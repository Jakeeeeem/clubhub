<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Player Finances - ClubHub</title>

  <!-- PWA Meta Tags -->
  <meta name="description" content="ClubHub - Manage your sports finances and subscriptions">
  <meta name="theme-color" content="#dc4343">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ClubHub">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/images/logo.png">

  <link rel="stylesheet" href="styles.css?v=20260502" />
  <link rel="stylesheet" href="group-switcher.css">
  <link rel="stylesheet" href="unified-nav.css?v=20260502">
  <script src="https://js.stripe.com/v3/"></script>
  <script src="app-state.js"></script>
  <script src="api-service.js?v=20260429_v18"></script>
  <script src="group-switcher.js?v=20260429_v18"></script>
  <script src="workspace-manager.js"></script>
  <link rel="stylesheet" href="tour-service.css">
  <script src="tour-service.js"></script>
  <link rel="stylesheet" href="design-system.css">
</head>

<body class="clubhub-unified dashboard-page">
  <script>
    window.UNIFIED_NAV_ENABLED = true;
  </script>
  <header class="header"></header>

  <main class="main dashboard-main">
    <div class="dashboard container dashboard-container">
      <div class="dashboard-content">
        <!-- Subscriptions -->
        <div id="player-subscriptions" class="dashboard-section" style="display:none;">
          <div class="glass-panel" style="padding: 2rem; margin-bottom: 2rem;">
            <h2 class="neon-text" style="margin-bottom: 1.5rem;">My Subscription</h2>
            <div id="currentPlanInfo" style="margin-bottom: 2rem;"></div>
            <div class="subscription-benefits"></div>
          </div>

          <div class="glass-panel" style="padding: 2rem;">
            <h2 class="neon-text" style="margin-bottom: 1.5rem;">Change Subscription Plan</h2>
            <div id="planAssignRow" class="dashboard-grid" style="align-items: flex-end;">
              <div class="form-group">
                <label for="planSelector">Choose Plan</label>
                <select id="planSelector"></select>
              </div>
              <div class="form-group">
                <label for="planStartDate">Start Date</label>
                <input type="date" id="planStartDate" />
              </div>
              <button class="btn btn-primary" id="assignPlanBtn">Update Subscription</button>
            </div>
          </div>
        </div>

        <!-- Payments -->
        <div id="player-payments" class="dashboard-section active" style="display:block;">
          <div class="dashboard-card-strip">
            <div class="dashboard-card-strip-item">
              <div class="dashboard-card-strip-label">Total Due</div>
              <div class="dashboard-card-strip-value" id="totalDue" style="color: var(--accent-red);">£0</div>
              <div class="dashboard-card-strip-meta">Outstanding balance</div>
            </div>
            <div class="dashboard-card-strip-item">
              <div class="dashboard-card-strip-label">Next Payment</div>
              <div class="dashboard-card-strip-value" id="nextPayment">£0</div>
              <div class="dashboard-card-strip-meta">Due by end of month</div>
            </div>
            <div class="dashboard-card-strip-item">
              <div class="dashboard-card-strip-label">Status</div>
              <div class="dashboard-card-strip-value" id="paymentStatus" style="font-size: 1.5rem;">Up to Date</div>
              <div class="dashboard-card-strip-meta">Financial standing</div>
            </div>
            <div class="dashboard-card-strip-item">
              <div class="dashboard-card-strip-label">Total Paid</div>
              <div class="dashboard-card-strip-value" id="totalPaid" style="color: #4ade80;">£0</div>
              <div class="dashboard-card-strip-meta">Lifetime contribution</div>
            </div>
          </div>

          <div class="glass-panel" style="padding: 2rem; margin-bottom: 2rem;">
            <h2 class="neon-text" style="margin-bottom: 1.5rem;">Payment History</h2>
            <div class="table-responsive">
              <table class="modern-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="paymentHistoryTableBody"></tbody>
              </table>
            </div>
          </div>

          <div class="glass-panel" style="padding: 2rem;">
            <h2 class="neon-text" style="margin-bottom: 1.5rem;">Outstanding Payments</h2>
            <div id="outstandingPayments" class="activity-card-list"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Essential scripts for player dashboard functionality -->
  <script src="script.js?v=20260429_v18"></script>
  <script src="player-dashboard.js?v=20260429_v21"></script>
  <script src="unified-nav.js?v=20260504_v4"></script>

  <script>
    // 🔒 AUTHENTICATION GUARD
    (function () {
      const token = localStorage.getItem('authToken');
      const currentUser = localStorage.getItem('currentUser');
      if (!token || !currentUser) {
        window.location.href = 'index.html';
        return;
      }
    })();

    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize player dashboard state
      if (typeof initializePlayerDashboard === 'function') {
        await initializePlayerDashboard();
      }

      // Force section visibility for finances
      const hash = window.location.hash.substring(1);
      if (hash === 'subscriptions' && typeof showPlayerSection === 'function') {
        showPlayerSection('subscriptions');
      } else if (typeof showPlayerSection === 'function') {
        showPlayerSection('payments');
      }
    });
  </script>
</body>
</html>
