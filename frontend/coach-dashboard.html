<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coach Hub | ClubHub</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Manage your team, track player performance, and plan training sessions">
    <meta name="theme-color" content="#dc4343">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="group-switcher.css">
    <link rel="stylesheet" href="unified-nav.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tour-service.css">
    <style>
        @media (max-width: 768px) {
            .card-grid, .stats-grid, .dashboard-grid {
                grid-template-columns: 1fr !important;
            }
            .dashboard-header {
                flex-direction: column !important;
                align-items: flex-start !important;
            }
        }
    </style>
</head>

<body>
    <script>window.UNIFIED_NAV_ENABLED = true;</script>
    <header class="header pro-header"></header>

    <main class="main dashboard-main" style="padding-top: 100px;">
        <div class="container dashboard-container">
            <div class="dashboard-header" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem;">
                    <div>
                        <h1 class="neon-text display-org-name">Coaching Hub</h1>
                        <p style="color: var(--text-muted);">Welcome back, Coach! Here's your squad's status.</p>
                    </div>
                    
                    <!-- Simplified Navigation Pills -->
                    <div class="nav-pill-group desktop-only">
                        <button class="nav-pill active" onclick="showCoachSection('overview')">Overview</button>
                        <button class="nav-pill" onclick="showCoachSection('teams')">Teams</button>
                        <button class="nav-pill" onclick="showCoachSection('players')">Roster</button>
                        <button class="nav-pill" onclick="showCoachSection('events')">Schedule</button>
                        <button class="nav-pill" onclick="showCoachSection('tactical-board')">Tactics</button>
                        <button class="nav-pill" onclick="showCoachSection('messenger')">Messages</button>
                    </div>
                </div>
            </div>

            <!-- Overview Section (Planner Mode) -->
            <div id="coach-overview" class="dashboard-section active">
                <div class="dashboard-layout-sidebar">
                    <!-- Central Activity Feed -->
                    <div class="feed-column">
                        <!-- Coach Post Creator -->
                        <div class="premium-feed-item" style="padding: 1.5rem; border-bottom: 1px solid var(--border-color);">
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <div class="author-avatar" style="background: var(--primary);">C</div>
                                <div style="flex: 1;">
                                    <textarea id="coachPostInput" 
                                              placeholder="Update your players or share training tips..." 
                                              style="width: 100%; background: transparent; border: none; color: white; resize: none; font-size: 1.1rem; outline: none;"
                                              rows="2"></textarea>
                                </div>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-top: 1rem; align-items: center;">
                                <div style="display: flex; gap: 1rem; color: var(--text-muted); font-size: 1.2rem;">
                                    <span style="cursor: pointer;" title="Add Video">🎥</span>
                                    <span style="cursor: pointer;" title="Add Image">🖼️</span>
                                    <span style="cursor: pointer;" title="Poll">📊</span>
                                </div>
                                <button class="btn btn-primary btn-small" onclick="createCoachPost()">Post to Team</button>
                            </div>
                        </div>

                        <div id="coachFeedContainer">
                            <div class="loading-spinner" style="margin: 2rem auto;"></div>
                        </div>
                    </div>

                    <!-- Right Sidebar: Daily Planner -->
                    <div class="planner-column">
                        <div class="planner-widget">
                            <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.75rem;">
                                📅 Today's Schedule
                            </h3>
                            <div id="coachDailyPlannerContainer">
                                <p style="color: var(--text-muted); font-size: 0.85rem;">Loading your day...</p>
                            </div>
                            <button class="btn btn-secondary btn-small" style="width: 100%; margin-top: 1.5rem;" onclick="showCoachSection('events')">
                                Full Schedule
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Messaging Section -->
            <div id="coach-messenger" class="dashboard-section" style="display: none;">
                <div class="dashboard-header" style="margin-bottom: 2rem;">
                    <h1 class="neon-text">Messenger</h1>
                    <p style="color: var(--text-muted);">Direct communication with players, scouts, and group staff.</p>
                </div>
                <div class="messaging-container" style="height: 70vh;">
                    <div class="message-sidebar">
                        <div id="messengerListItems" class="message-list"></div>
                    </div>
                    <div class="message-view" id="messageViewContainer">
                        <div class="message-view-empty">
                            <p>Select a contact to start messaging</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Other placeholders for JS logic -->
            <div id="coach-teams" class="dashboard-section" style="display: none;">
                <div class="card">
                    <h3>My Teams</h3>
                    <div id="coachTeamsList"></div>
                </div>
            </div>
            <div id="coach-players" class="dashboard-section" style="display: none;">
                <div class="card">
                    <h3>Active Rosters</h3>
                    <div id="coachPlayersList"></div>
                </div>
            </div>
            <div id="coach-events" class="dashboard-section" style="display: none;">
                <div class="card">
                    <h3>Training & Match Schedule</h3>
                    <div id="coachEventsList"></div>
                </div>
            </div>
            <div id="coach-tactical-board" class="dashboard-section" style="display: none;">
                <div class="card card-glass-red" style="padding: 1.5rem;">
                    <h3>🏟️ Lineup Planner</h3>
                    <div id="tacticalBoard" style="height: 600px; background: #1a472a; border-radius: 24px;"></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="pro-bottom-nav mobile-only">
        <div class="bottom-nav-container" id="pro-bottom-nav-content"></div>
    </nav>

    <!-- Core Dependencies -->
    <script src="api-service.js"></script>
    <script src="enhanced-login-handler.js"></script>
    <script src="pwa-install.js"></script>
    <script src="unified-nav.js"></script>
    <script src="group-switcher.js"></script>
    <script src="coach-dashboard.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const isLoggedIn = await checkAuthStatus();
            if (!isLoggedIn) {
                window.location.href = 'index.html';
                return;
            }

            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                document.getElementById('coachNameDisplay').textContent = user.firstName || user.first_name || 'Coach';
                document.getElementById('userInitial').textContent = (user.firstName || user.first_name || 'C').charAt(0).toUpperCase();
            }

            // Sync toggle state
            const toggle = document.getElementById('mode-toggle');
            if (toggle) {
                toggle.checked = false;
                toggle.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        window.location.href = 'player-dashboard.html';
                    }
                });
            }
        });

        function showCoachSection(sectionId) {
            document.querySelectorAll('.dashboard-section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(`coach-${sectionId}`);
            if (target) target.style.display = 'block';
        }
    </script>

</body>

</html>
