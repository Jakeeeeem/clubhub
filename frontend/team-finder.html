<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Finder - Find Your Squad | ClubHub</title>
    <meta name="description" content="Discover sports teams and grassroots squads looking for players.">
    <meta name="theme-color" content="#dc4343">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ClubHub">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="apple-touch-icon" href="/images/logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="unified-nav.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #0d0d0d;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(177, 3, 45, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(177, 3, 45, 0.05) 0%, transparent 50%);
        }

        .finder-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 1.5rem 4rem;
        }

        @media (max-width: 991px) {
            .finder-container {
                padding-top: 10px;
            }
            .search-hero {
                padding: 1rem 0;
                margin-bottom: 1.5rem;
            }
            .search-hero h1 {
                font-size: 2.2rem !important;
            }
        }

        .search-hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 1rem;
        }

        .filter-bar {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 3rem;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 85px;
            z-index: 50;
        }

        @media (max-width: 992px) {
            .filter-bar {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .filter-bar {
                grid-template-columns: 1fr;
            }
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .filter-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: #fff;
            font-family: inherit;
        }

        .club-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .club-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(177, 3, 45, 0.1);
        }

        .club-banner {
            height: 120px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            position: relative;
        }

        .club-logo-mini {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            border: 3px solid var(--bg-card);
            position: absolute;
            bottom: -35px;
            left: 20px;
            background: #111;
            object-fit: cover;
        }

        .club-content {
            padding: 45px 20px 20px;
        }

        .club-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .club-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tag {
            background: rgba(177, 3, 45, 0.1);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .recruit-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #22c55e;
            color: #000;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            text-transform: uppercase;
        }
    </style>
</head>

<body class="dashboard-view app-layout">
    <script>window.UNIFIED_NAV_ENABLED = true;</script>
    <main class="dashboard-main">
    <div class="finder-container">
        <div class="search-hero">
            <h1 class="neon-text" style="font-size: 3.5rem; margin-bottom: 1rem;">Team Finder</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Find local squads looking for your position.</p>
        </div>

        <!-- Advanced Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>Squad Keyword</label>
                <input type="text" id="teamSearch" class="filter-input" placeholder="e.g. Under 16s..." onkeyup="filterTeams()">
            </div>
            <div class="filter-group">
                <label>Sport</label>
                <select id="sportFilter" class="filter-input" onchange="filterTeams()">
                    <option value="">All Sports</option>
                    <option value="football">Football</option>
                    <option value="basketball">Basketball</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Postcode</label>
                <input type="text" id="locationSearch" class="filter-input" placeholder="e.g. SW1..." onkeyup="filterTeams()">
            </div>
            <div class="filter-group">
                <label>Recruiting</label>
                <select id="recruitFilter" class="filter-input" onchange="filterTeams()">
                    <option value="yes">Actively Recruiting</option>
                    <option value="no">Any</option>
                </select>
            </div>
            <button class="btn btn-primary" style="padding: 0.8rem 2rem;" onclick="filterTeams()">Search</button>
        </div>

        <div id="teamResultsGrid" class="card-grid" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));">
            <!-- Populated via JS -->
        </div>
    </div>
    </main>

    <script src="api-service.js?v=20260424_v4"></script>
    <script src="unified-nav.js?v=20260424_v4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            filterTeams();
        });

        async function filterTeams() {
            const grid = document.getElementById('teamResultsGrid');
            const teams = [
                { id: 1, name: 'Lightning Bolts U14', club: 'City FC', sport: 'Football', location: 'London', icon: '⚽' },
                { id: 2, name: 'Tidal Wave Juniors', club: 'Surf Academy', sport: 'Basketball', location: 'Brighton', icon: '🏀' },
                { id: 3, name: 'Iron Giants Elite', club: 'Rugby Union', sport: 'Rugby', location: 'Leicester', icon: '🏉' }
            ];

            grid.innerHTML = teams.map(t => `
                <div class="club-card">
                    <div class="club-banner">
                        <div style="position:absolute; bottom:10px; left:20px; font-size:2rem;">${t.icon}</div>
                        <span class="recruit-badge">Recruiting</span>
                    </div>
                    <div class="club-content">
                        <h3 class="club-name">${t.name}</h3>
                        <div class="club-meta">
                            <span>🛡️ ${t.club}</span>
                            <span>📍 ${t.location}</span>
                        </div>
                        <div class="tag-list">
                            <span class="tag">${t.sport}</span>
                            <span class="tag">Immediate Start</span>
                        </div>
                        <button class="btn btn-primary" style="width:100%;" onclick="alert('Applying to team...')">Apply to Join</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
