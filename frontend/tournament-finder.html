<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Finder - Knockout Brackets & Leagues | ClubHub</title>
    <meta name="description" content="Find and enter regional and global sports tournaments.">
    <meta name="theme-color" content="#dc4343">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ClubHub">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="apple-touch-icon" href="/images/logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260502">
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="unified-nav.css?v=20260502">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #0d0d0d;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(177, 3, 45, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(177, 3, 45, 0.05) 0%, transparent 50%);
        }

        .finder-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 1.5rem 4rem;
        }

        @media (max-width: 991px) {
            .finder-container {
                padding-top: 10px;
            }
            .search-hero {
                padding: 1rem 0;
                margin-bottom: 1.5rem;
            }
            .search-hero h1 {
                font-size: 2.2rem !important;
            }
        }

        .search-hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 1rem;
        }

        .filter-bar {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 3rem;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 85px;
            z-index: 50;
        }

        @media (max-width: 992px) {
            .filter-bar {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .filter-bar {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 991px) {
            .finder-container {
                padding: 10px 1rem 3rem !important;
            }
            .search-hero {
                padding: 1rem 0;
                margin-bottom: 1rem;
            }
            .search-hero h1 {
                font-size: 2.4rem !important;
            }
            .filter-bar {
                position: static !important;
                top: auto !important;
                z-index: auto !important;
                border-radius: 16px !important;
                grid-template-columns: 1fr !important;
                padding: 1rem !important;
                gap: 0.75rem !important;
                align-items: stretch !important;
                margin-bottom: 1.5rem !important;
            }
            .filter-bar button {
                width: 100% !important;
            }
            #tourneyResultsGrid {
                grid-template-columns: 1fr !important;
                gap: 1rem !important;
            }
            .club-banner {
                height: 120px !important;
                font-size: 2.3rem !important;
            }
            .club-content {
                padding: 1.25rem !important;
            }
            .club-meta {
                flex-direction: column !important;
                gap: 0.5rem !important;
            }
            .format-badge {
                top: 0.75rem !important;
                right: 0.75rem !important;
            }
            main.dashboard-main {
                padding-top: 120px !important;
            }
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .filter-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: #fff;
            font-family: inherit;
        }

        .club-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .club-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(177, 3, 45, 0.1);
        }

        .club-banner {
            height: 140px;
            background: linear-gradient(135deg, #4c1d95, #1e1b4b);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .club-content {
            padding: 20px;
        }

        .club-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .club-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tag {
            background: rgba(139, 92, 246, 0.1);
            color: #a78bfa;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .format-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="dashboard-view app-layout">
    <script>window.UNIFIED_NAV_ENABLED = true;</script>
    <main class="dashboard-main">
    <div class="finder-container">
        <div class="search-hero">
            <h1 class="neon-text" style="font-size: 3.5rem; margin-bottom: 1rem;">Tournament Finder</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Join official brackets and compete for global rankings.</p>
        </div>

        <!-- Advanced Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>Tournament Title</label>
                <input type="text" id="tourneySearch" class="filter-input" placeholder="Search tournaments..." onkeyup="filterTourneys()">
            </div>
            <div class="filter-group">
                <label>Format</label>
                <select id="formatFilter" class="filter-input" onchange="filterTourneys()">
                    <option value="">All Formats</option>
                    <option value="knockout">Knockout</option>
                    <option value="league">League</option>
                    <option value="group">Group + Knockout</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="statusFilter" class="filter-input" onchange="filterTourneys()">
                    <option value="">Any Status</option>
                    <option value="open">Registration Open</option>
                    <option value="live">Live Matches</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Age Limit</label>
                <select id="ageFilter" class="filter-input" onchange="filterTourneys()">
                    <option value="">No Limit</option>
                    <option value="u16">Under 16s</option>
                    <option value="u18">Under 18s</option>
                    <option value="adult">Seniors</option>
                </select>
            </div>
            <button class="btn btn-primary" style="padding: 0.8rem 2rem;" onclick="filterTourneys()">Find</button>
        </div>

        <div id="tourneyResultsGrid" class="card-grid" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));">
            <!-- Populated via JS -->
        </div>
    </div>
    </main>

    <script src="api-service.js?v=20260429_v18"></script>
    <script src="unified-nav.js?v=20260429_v18"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            filterTourneys();
        });

        async function filterTourneys() {
            const grid = document.getElementById('tourneyResultsGrid');
            const search = document.getElementById('tourneySearch').value;
            const format = document.getElementById('formatFilter').value;
            const status = document.getElementById('statusFilter').value;
            const ageGroup = document.getElementById('ageFilter').value;
            
            try {
                let url = '/events?public=true&eventType=tournament';
                
                let tourneys = await apiService.makeRequest(url) || [];
                // Unify if nested
                if (tourneys.events) tourneys = tourneys.events;
                if (tourneys.data) tourneys = tourneys.data;
                if (!Array.isArray(tourneys)) tourneys = [];
                
                // Client-side filtering
                tourneys = tourneys.filter(t => {
                    const matchSearch = !search || (t.title && t.title.toLowerCase().includes(search.toLowerCase()));
                    const matchFormat = !format || (t.format && t.format.toLowerCase() === format.toLowerCase());
                    const matchStatus = !status || (t.status && t.status.toLowerCase() === status.toLowerCase());
                    return matchSearch && matchFormat && matchStatus;
                });

                if (tourneys.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1 / -1; padding: 4rem 1rem; text-align: center; color: var(--text-muted);"><h3>No tournaments found</h3><p>Try adjusting your search criteria</p></div>';
                    return;
                }

                grid.innerHTML = tourneys.map(t => {
                    const formatDisplay = t.format || 'Knockout';
                    return `
                    <div class="club-card">
                        <div class="club-banner">
                            <span class="format-badge">${formatDisplay}</span>
                            🏆
                        </div>
                        <div class="club-content">
                            <h3 class="club-name">${t.title}</h3>
                            <div class="club-meta">
                                <span>📍 ${t.location || 'TBA'}</span>
                                <span>💰 ${t.price && t.price > 0 ? `£${t.price}` : 'Free'}</span>
                            </div>
                            <div class="tag-list">
                                <span class="tag">Tournament</span>
                                <span class="tag">${t.status === 'live' ? 'Live Brackets' : 'Registering'}</span>
                            </div>
                            <button class="btn btn-primary" style="width:100%;" onclick="window.location.href='event-qr.html?id=${t.id}'">View Details</button>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("Error fetching tournaments:", error);
                grid.innerHTML = '<div style="grid-column: 1 / -1; padding: 4rem 1rem; text-align: center; color: #f87171;">Failed to load tournaments.</div>';
            }
        }
    </script>
</body>
</html>
