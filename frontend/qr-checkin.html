<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>QR Check-in</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px
        }
    </style>
</head>

<body>
    <h2>QR Check-in</h2>
    <div>
        <label>Event ID: <input id="eventId" /></label>
    </div>
    <div>
        <label>Token: <input id="token" style="width:80%" /></label>
    </div>
    <div>
        <label>Player ID (optional): <input id="playerId" /></label>
    </div>
    <div style="margin-top:12px">
        <button id="submit">Submit Check-in</button>
    </div>
    <div id="status" style="margin-top:12px"></div>
    <script>
        document.getElementById('submit').addEventListener('click', async () => {
            const eventId = document.getElementById('eventId').value.trim();
            const token = document.getElementById('token').value.trim();
            const playerId = document.getElementById('playerId').value.trim() || undefined;
            if (!eventId || !token) return alert('Event ID and token required');
            try {
                const res = await fetch(`/api/events/${eventId}/qr-checkin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, playerId }),
                    credentials: 'same-origin'
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || JSON.stringify(data));
                document.getElementById('status').innerText = 'Check-in successful';
            } catch (e) {
                document.getElementById('status').innerText = 'Error: ' + e.message;
            }
        });
    </script>
    <script src="unified-nav.js?v=20260429_v17"></script>
</body>

</html>
